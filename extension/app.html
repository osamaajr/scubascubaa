<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScubaScubaa</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="drop-panel">
      <div class="panel-head">
        <span class="dot"></span>
        <strong>ScubaScubaa</strong>
      </div>

      <section class="camera-card" aria-label="Camera">
        <video id="camera" class="camera" autoplay muted playsinline></video>
        <canvas id="overlay" class="overlay"></canvas>
        <div id="messageText" class="message-text" aria-live="polite">Starting camera...</div>

        <div id="gatoMode" class="gato-mode" aria-hidden="true">
          <video id="gatoVideo" src="../gato.mp4" muted loop playsinline></video>
        </div>
      </section>

      <audio id="gatoAudio" src="../audio.mp3" preload="auto"></audio>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
