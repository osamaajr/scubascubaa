<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScubaScubaa Camera</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="camera-shell">
      <video id="camera" class="camera" autoplay muted playsinline></video>
      <canvas id="overlay" class="overlay"></canvas>
      <div id="messageText" class="message-text" aria-live="polite">Starting camera...</div>
      <audio id="gatoAudio" src="../audio.mp3" preload="auto"></audio>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
